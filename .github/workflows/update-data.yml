name: Aggiornamento Mensile Dati

on:
  schedule:
    - cron: '0 4 1 * *'   # 1° di ogni mese alle 04:00 UTC
  workflow_dispatch:        # esecuzione manuale dal tab Actions

jobs:
  update-and-publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Installa dipendenze Python
      run: pip install -r tools/requirements.txt

    - name: Genera database Atlante
      run: python tools/build_atlante.py --output src/Italy.Core/data/italy.db

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build
      run: dotnet build src/Italy.Core/Italy.Core.csproj -f net8.0 -c Release

    - name: Test
      run: dotnet test tests/Italy.Core.Tests/Italy.Core.Tests.csproj -f net8.0 --no-restore

    - name: Calcola nuova versione
      id: version
      run: |
        # Legge la versione attuale dal csproj e fa bump patch
        VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/Italy.Core/Italy.Core.csproj)
        MAJOR=$(echo $VERSION | cut -d. -f1)
        MINOR=$(echo $VERSION | cut -d. -f2)
        PATCH=$(echo $VERSION | cut -d. -f3)
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Versione: $VERSION → $NEW_VERSION"

    - name: Aggiorna versione nel csproj
      run: |
        NEW_VERSION=${{ steps.version.outputs.new_version }}
        sed -i "s|<Version>.*</Version>|<Version>$NEW_VERSION</Version>|" src/Italy.Core/Italy.Core.csproj

    - name: Commit e tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/Italy.Core/data/italy.db src/Italy.Core/Italy.Core.csproj
        git commit -m "chore: Data Pack $(date +%Y.%m) — aggiornamento automatico dati ISTAT"
        git tag "v${{ steps.version.outputs.new_version }}"
        git push origin main --tags

    - name: Pubblica su NuGet
      run: |
        dotnet pack src/Italy.Core/Italy.Core.csproj -c Release --no-build \
          -p:Version=${{ steps.version.outputs.new_version }}
        dotnet nuget push src/Italy.Core/bin/Release/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Crea GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: "Data Pack $(date +%Y.%m) — v${{ steps.version.outputs.new_version }}"
        body: |
          ## Aggiornamento automatico dati
          - Dati ISTAT comuni aggiornati
          - Variazioni storiche aggiornate
          - Zone sismiche aggiornate
          - Banche GLEIF aggiornate
          - Enti IndicePA aggiornati

          **Data Pack:** $(date +%Y.%m)
        files: src/Italy.Core/bin/Release/*.nupkg
