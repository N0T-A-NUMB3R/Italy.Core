name: Pubblica su NuGet

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore src/Italy.Core/Italy.Core.csproj

    - name: Build
      run: dotnet build src/Italy.Core/Italy.Core.csproj -c Release --no-restore

    - name: Pack
      run: dotnet pack src/Italy.Core/Italy.Core.csproj -c Release -o ./nuget-output

    - name: Pubblica su NuGet
      run: |
        $pkg = Get-ChildItem ./nuget-output/*.nupkg | Select-Object -First 1
        if (-not $pkg) { Write-Error "Nessun .nupkg trovato in ./nuget-output"; exit 1 }
        dotnet nuget push $pkg.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
